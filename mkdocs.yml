site_name: Prefect Examples
site_description: Progressive Prefect 3 examples — from hello-world to production patterns.
repo_url: https://github.com/mortenoh/prefect-examples

theme:
  name: material
  palette:
    - scheme: default
      primary: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Tutorials: tutorials.md
  - Core Concepts: core-concepts.md
  - Flow Reference: flow-reference.md
  - Patterns: patterns.md
  - Feature Coverage: feature-coverage.md
  - Infrastructure: infrastructure.md
  - Data Sources:
    - Climate Integration: climate-integration.md
    - ERA5-Land: era5-land.md
    - CHIRPS: chirps.md
    - Open-Meteo: openmeteo.md
    - GeoTIFF Format: geotiff-format.md
    - ISO3 Country Codes: iso3-country-codes.md
    - xarray and rioxarray: xarray-rioxarray-guide.md
  - CLI Reference: cli-reference.md
  - API Reference: api-reference.md
  - Testing: testing.md
